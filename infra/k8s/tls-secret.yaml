# TLS Secret for Ingress host hospital.local
# =============================================================================
# This file is documentation only (no Kubernetes object). Applying it is a no-op.
# Never commit hospital.key / hospital.crt.
#
# Generate a self-signed certificate and create Secret hospital-tls:
#
#   ./scripts/k8s/generate-tls.sh
#
# Manual equivalent:
#
#   mkdir -p infra/k8s/certs
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout infra/k8s/certs/hospital.key \
#     -out infra/k8s/certs/hospital.crt \
#     -subj "/CN=hospital.local" \
#     -addext "subjectAltName=DNS:hospital.local"
#
#   kubectl create secret tls hospital-tls \
#     --cert=infra/k8s/certs/hospital.crt \
#     --key=infra/k8s/certs/hospital.key \
#     -n healthcare --dry-run=client -o yaml | kubectl apply -f -
#
# Expected Secret after generate-tls.sh:
#
#   apiVersion: v1
#   kind: Secret
#   metadata:
#     name: hospital-tls
#     namespace: healthcare
#   type: kubernetes.k8s.io/tls
#   data:
#     tls.crt: <base64>
#     tls.key: <base64>
#
# Ingress (ingress.yaml) references secretName: hospital-tls.
