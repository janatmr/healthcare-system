# Hospital Management System — local development stack
# Usage (from repo root):
#   docker compose -f infra/docker-compose.yml up --build
#   npm run docker:up

services:
  mongodb:
    image: mongo:7
    container_name: healthcare-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: healthcare-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/healthcare
      APPOINTMENT_SERVICE_URL: http://appointment-service:5001
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - healthcare-network

  appointment-service:
    build:
      context: ../microservices/appointment-service
      dockerfile: Dockerfile
    container_name: healthcare-appointment-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      MONGODB_URI: mongodb://mongodb:27017/healthcare
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - healthcare-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: healthcare-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      VITE_API_URL: http://localhost:5000
      NODE_ENV: development
    depends_on:
      - backend
    networks:
      - healthcare-network

volumes:
  mongodb_data:
    name: healthcare-mongodb-data

networks:
  healthcare-network:
    name: healthcare-network
    driver: bridge
