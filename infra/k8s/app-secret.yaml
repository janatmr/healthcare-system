# JWT shared by backend and appointment-service.
# Prefer creating/updating via:
#   kubectl create secret generic healthcare-jwt \
#     --from-literal=JWT_SECRET='your-long-random-secret' \
#     -n healthcare --dry-run=client -o yaml | kubectl apply -f -
#
# The placeholder below lets `kubectl apply` succeed for local Minikube demos only.
# Replace before any shared or production-like environment.
apiVersion: v1
kind: Secret
metadata:
  name: healthcare-jwt
  namespace: healthcare
  labels:
    app.kubernetes.io/part-of: healthcare-system
type: Opaque
stringData:
  JWT_SECRET: "minikube-dev-only-change-me-before-any-shared-use"
