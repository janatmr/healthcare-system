apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: healthcare
  labels:
    app: appointment-service
    app.kubernetes.io/part-of: healthcare-system
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
        app.kubernetes.io/part-of: healthcare-system
    spec:
      restartPolicy: Always
      containers:
        - name: appointment-service
          image: healthcare-appointment:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5001
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: APPOINTMENT_PORT
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: MONGODB_URI
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: CORS_ORIGINS
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: JWT_EXPIRES_IN
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthcare-jwt
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
