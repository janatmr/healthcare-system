name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Test-only values — never production secrets, never echoed in logs
  JWT_SECRET: ci-test-jwt-secret-not-for-production
  E2E_ADMIN_EMAIL: admin@hospital.local
  E2E_ADMIN_PASSWORD: Password123!

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret / credential file check
        run: npm run security:check

      - name: Production dependency audit (high+)
        run: npm run security:audit

      - name: ESLint
        run: npm run lint

      - name: Frontend production build
        run: npm run build:frontend
        env:
          VITE_API_URL: http://127.0.0.1:5000
          VITE_APPOINTMENT_URL: http://127.0.0.1:5001

      - name: Jest unit + integration
        run: npm test

  e2e:
    name: Playwright E2E
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright suite
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse audits
        run: npm run lighthouse
        continue-on-error: true
        id: lighthouse

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          if-no-files-found: ignore
          retention-days: 7

      - name: Fail job if Lighthouse assertions failed
        if: steps.lighthouse.outcome == 'failure'
        run: exit 1

  docker:
    name: Docker image builds
    needs: [quality, e2e, lighthouse]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            file: backend/Dockerfile
            tags: healthcare-backend:ci
            build-args: ''
          - name: appointment-service
            file: microservices/appointment-service/Dockerfile
            tags: healthcare-appointment:ci
            build-args: ''
          - name: frontend
            file: frontend/Dockerfile
            tags: healthcare-frontend:ci
            build-args: |
              VITE_API_URL=http://localhost:5000
              VITE_APPOINTMENT_URL=http://localhost:5001
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          load: false
          tags: ${{ matrix.tags }}
          build-args: ${{ matrix.build-args }}
